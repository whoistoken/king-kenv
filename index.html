<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KEN - Asisten AI Pribadi</title>
    <!-- Font & styling -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0b0d11;
            color: #e4e7ec;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            height: 95vh;
            max-height: 900px;
            background: rgba(22, 26, 33, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 24px 28px 20px;
        }

        /* HEADER */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-shrink: 0;
        }

        .brand h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f0b3ff, #8ec5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .brand span {
            font-size: 13px;
            color: #8f97a8;
            font-weight: 500;
            display: block;
            margin-top: -4px;
        }

        .api-section {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px 6px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .api-section label {
            font-size: 11px;
            font-weight: 600;
            color: #8f97a8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .api-section input {
            background: transparent;
            border: none;
            color: #e4e7ec;
            font-size: 13px;
            padding: 6px 0;
            width: 180px;
            outline: none;
            font-family: 'Inter', monospace;
        }

        .api-section input::placeholder {
            color: #4a5266;
            font-size: 12px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #f44336;
            flex-shrink: 0;
            transition: 0.3s;
        }
        .status-dot.online {
            background: #4caf50;
        }

        /* QUICK ACTION BUTTONS */
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 18px;
            flex-shrink: 0;
        }

        .quick-btn {
            flex: 1;
            min-width: 70px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 40px;
            padding: 10px 0;
            color: #c8cedb;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .quick-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
            transform: translateY(-1px);
        }

        .quick-btn.active {
            background: rgba(142, 197, 252, 0.15);
            border-color: #8ec5fc;
            color: #8ec5fc;
            box-shadow: 0 0 20px rgba(142, 197, 252, 0.05);
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 6px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar {
            width: 4px;
        }
        .chat-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #2a3140;
            border-radius: 20px;
        }

        .message {
            padding: 14px 18px;
            border-radius: 18px;
            max-width: 92%;
            line-height: 1.6;
            font-size: 15px;
            word-break: break-word;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
            background: #1f2736;
            border-bottom-right-radius: 4px;
            color: #eef2f7;
        }

        .message.assistant {
            align-self: flex-start;
            background: #141920;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: #d6dce8;
        }

        .message.error {
            align-self: center;
            background: rgba(244, 67, 54, 0.12);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #ff8a80;
            font-size: 13px;
            max-width: 100%;
            text-align: center;
        }

        .message .label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.5;
            margin-bottom: 4px;
            display: block;
        }

        .typing-indicator {
            align-self: flex-start;
            background: #141920;
            padding: 14px 22px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: none;
        }
        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #8f97a8;
            border-radius: 50%;
            margin: 0 3px;
            animation: bounce 1.4s infinite both;
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* INPUT */
        .input-area {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: 0.2s;
        }

        .input-area:focus-within {
            border-color: rgba(142, 197, 252, 0.3);
        }

        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e4e7ec;
            font-size: 15px;
            padding: 14px 0;
            outline: none;
            font-family: 'Inter', sans-serif;
        }
        .input-area input::placeholder {
            color: #4a5266;
        }

        .input-area button {
            background: linear-gradient(135deg, #8ec5fc, #b388ff);
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 14px;
            color: #0b0d11;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }

        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(142, 197, 252, 0.25);
        }

        .input-area button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* Model selector kecil */
        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-shrink: 0;
        }

        .footer-bar select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            color: #c8cedb;
            padding: 4px 14px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            outline: none;
            cursor: pointer;
        }

        .footer-bar .hint {
            font-size: 12px;
            color: #4a5266;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .app-container {
                padding: 16px;
                height: 98vh;
                border-radius: 20px;
            }
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }
            .api-section input {
                width: 120px;
            }
            .quick-actions {
                gap: 6px;
            }
            .quick-btn {
                font-size: 12px;
                padding: 8px 0;
                min-width: 55px;
            }
            .input-area {
                padding-left: 14px;
            }
            .input-area button {
                padding: 10px 18px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

<div class="app-container" id="app">
    <!-- HEADER -->
    <div class="header">
        <div class="brand">
            <h1>KEN</h1>
            <span>Asisten AI Pribadi Kamu</span>
        </div>
        <div class="api-section">
            <label>🔑 Key</label>
            <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off" />
            <span class="status-dot" id="statusDot"></span>
        </div>
    </div>

    <!-- QUICK ACTIONS -->
    <div class="quick-actions">
        <button class="quick-btn" data-prompt="Jelaskan konsep rumit jadi simpel.">✨ Tanya</button>
        <button class="quick-btn" data-prompt="Bantuin nulis / rapikan teks.">📝 Tulis</button>
        <button class="quick-btn" data-prompt="Debug potongan kode.">💻 Kode</button>
        <button class="quick-btn" data-prompt="Brainstorming ide baru.">🧠 IDE</button>
    </div>

    <!-- CHAT -->
    <div class="chat-area" id="chatArea">
        <!-- Pesan selamat datang -->
        <div class="message assistant">
            <span class="label">KEN</span>
            Halo! Saya KEN. <br />
            Tanya apa aja, atau pilih tombol pintas di atas. <br />
            <span style="font-size:13px; color:#6a7288;">(Masukkan API Key OpenAI di pojok kanan atas dulu ya)</span>
        </div>
    </div>

    <!-- TYPING INDICATOR -->
    <div class="typing-indicator" id="typingIndicator">
        <span></span><span></span><span></span>
    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan ke KEN..." />
        <button id="sendButton">Kirim</button>
    </div>

    <!-- FOOTER -->
    <div class="footer-bar">
        <select id="modelSelect">
            <option value="gpt-4o-mini">gpt-4o-mini</option>
            <option value="gpt-4-turbo">gpt-4-turbo</option>
            <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        </select>
        <span class="hint">Deep Think • v2</span>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // --- DOM refs ---
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendButton');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const statusDot = document.getElementById('statusDot');
        const modelSelect = document.getElementById('modelSelect');
        const typingIndicator = document.getElementById('typingIndicator');
        const quickBtns = document.querySelectorAll('.quick-btn');

        // --- State ---
        let currentMode = null; // untuk tracking tombol aktif

        // --- Load API Key dari localStorage ---
        const savedKey = localStorage.getItem('ken_openai_key');
        if (savedKey) {
            apiKeyInput.value = savedKey;
            updateStatus(true);
        }

        // --- Simpan API Key saat diinput ---
        apiKeyInput.addEventListener('input', function() {
            const raw = this.value;
            // HANYA ambil karakter ASCII yang valid (sk-... alfanumerik & strip)
            // Tapi kita simpan asli, nanti di trim saat dipakai.
            const cleaned = raw.replace(/[^a-zA-Z0-9\-_]/g, ''); // Hanya amankan dari karakter aneh, tapi jangan hapus 'sk-'
            // Biarkan user mengetik, kita hanya trim saat send.
            localStorage.setItem('ken_openai_key', raw.trim());
            if (raw.trim().length > 10) {
                updateStatus(true);
            } else {
                updateStatus(false);
            }
        });

        function updateStatus(isOnline) {
            if (isOnline && apiKeyInput.value.trim().startsWith('sk-')) {
                statusDot.className = 'status-dot online';
            } else {
                statusDot.className = 'status-dot';
            }
        }

        // --- Quick Actions ---
        quickBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                const prompt = this.dataset.prompt;
                if (!prompt) return;

                // Kosongkan active state
                quickBtns.forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentMode = this.innerText.trim();

                // Isi input
                userInput.value = prompt;
                userInput.focus();
            });
        });

        // --- Send Message ---
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                addMessage('error', '⚠️ Masukkan API Key OpenAI terlebih dahulu di pojok kanan atas.');
                return;
            }
            if (!apiKey.startsWith('sk-')) {
                addMessage('error', '⚠️ Format API Key salah. Harus diawali dengan "sk-".');
                return;
            }

            // Nonaktifkan tombol
            sendBtn.disabled = true;
            userInput.disabled = true;

            // Tampilkan pesan user
            addMessage('user', message);
            userInput.value = '';
            quickBtns.forEach(b => b.classList.remove('active'));

            // Tampilkan typing indicator
            typingIndicator.style.display = 'block';
            scrollToBottom();

            try {
                const model = modelSelect.value;

                // --- KONFIGURASI HEADER YANG AMAN (ISO-8859-1 / ASCII) ---
                // TIDAK ADA karakter non-ASCII di sini. Semua string plain.
                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey  // <- PASTIKAN TIDAK ADA KARAKTER ANEH
                };

                const payload = {
                    model: model,
                    messages: [
                        { role: 'system', content: 'Kamu adalah KEN, asisten AI pribadi yang ramah dan membantu. Jawab dalam bahasa Indonesia.' },
                        { role: 'user', content: message }
                    ],
                    temperature: 0.7,
                    max_tokens: 1024,
                };

                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: headers,
                    body: JSON.stringify(payload)
                });

                // Sembunyikan typing
                typingIndicator.style.display = 'none';

                if (!response.ok) {
                    let errorMsg = `⚠️ API Error (${response.status})`;
                    try {
                        const errData = await response.json();
                        if (errData.error && errData.error.message) {
                            errorMsg = `⚠️ ${errData.error.message}`;
                        }
                    } catch (_) {
                        // ignore
                    }
                    // Cek spesifik untuk incorrect key
                    if (response.status === 401) {
                        errorMsg = '⚠️ API Key tidak valid (401). Periksa kembali key Anda di platform.openai.com';
                        updateStatus(false);
                    }
                    addMessage('error', errorMsg);
                    sendBtn.disabled = false;
                    userInput.disabled = false;
                    return;
                }

                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    const reply = data.choices[0].message.content;
                    addMessage('assistant', reply);
                } else {
                    addMessage('error', '⚠️ Respons dari OpenAI kosong.');
                }

            } catch (error) {
                typingIndicator.style.display = 'none';
                let errText = error.message || 'Terjadi kesalahan jaringan.';
                // Jika error berhubungan dengan header (non-ISO), beri tahu solusi.
                if (errText.includes('headers') || errText.includes('ISO-8859-1')) {
                    errText = '⚠️ Error header: Pastikan API Key tidak mengandung karakter aneh (emoji/kutip melengkung). Kami sudah bersihkan otomatis. Coba generate ulang key di OpenAI.';
                }
                addMessage('error', `⚠️ Gagal: ${errText}`);
            }

            // Aktifkan kembali
            sendBtn.disabled = false;
            userInput.disabled = false;
            userInput.focus();
            scrollToBottom();
        }

        // --- Add message to chat ---
        function addMessage(type, content) {
            const div = document.createElement('div');
            div.className = `message ${type}`;

            if (type === 'assistant') {
                const label = document.createElement('span');
                label.className = 'label';
                label.textContent = 'KEN';
                div.appendChild(label);
                const text = document.createElement('span');
                text.textContent = content;
                div.appendChild(text);
            } else if (type === 'user') {
                const label = document.createElement('span');
                label.className = 'label';
                label.textContent = 'KAMU';
                div.appendChild(label);
                const text = document.createElement('span');
                text.textContent = content;
                div.appendChild(text);
    } else {
                // error
                div.textContent = content;
            }

            chatArea.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatArea.scrollTop = chatArea.scrollHeight;
            }, 50);
        }

        // --- Event Listeners ---
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Cek status awal
        if (savedKey && savedKey.startsWith('sk-')) {
            updateStatus(true);
        }

        console.log('✅ KEN Assistant siap! (Header aman ISO-8859-1)');
    })();
</script>

</body>
</html>
