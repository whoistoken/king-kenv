<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KEN // CYBER</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: #050608;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background-image: radial-gradient(circle at 30% 40%, #120b1a 0%, #030104 90%);
        }

        .app-wrapper {
            max-width: 880px;
            width: 100%;
            height: 95vh;
            max-height: 950px;
            background: rgba(8, 6, 14, 0.85);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow: 0 0 60px rgba(255, 0, 80, 0.1), inset 0 0 80px rgba(0, 255, 255, 0.02);
            display: flex;
            flex-direction: column;
            padding: 18px 22px 18px;
            position: relative;
            overflow: hidden;
        }

        .app-wrapper::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 80, 0.02) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }/* === CYBER HEAD === */
        .cyber-container {
            position: absolute;
            bottom: 110px;
            right: 25px;
            z-index: 10;
            animation: floatGlitch 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 0, 80, 0.3));
            pointer-events: none;
        }

        @keyframes floatGlitch {
            0%,
            100% {
                transform: translateY(0px) rotate(0deg);
            }
            25% {
                transform: translateY(-8px) rotate(1deg);
            }
            75% {
                transform: translateY(-12px) rotate(-1deg);
            }
        }

        .cyber-head {
            width: 90px;
            height: 90px;
            background: #0c0815;
            border-radius: 50% 50% 40% 40%;
            border: 3px solid #00f0ff;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.2), inset 0 0 30px rgba(255, 0, 80, 0.1);
            position: relative;
            clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 90% 80%, 70% 100%, 30% 100%, 10% 80%, 0% 30%);
            animation: borderPulse 3s linear infinite;
        }

        @keyframes borderPulse {
            0%,
            100% {
                border-color: #00f0ff;
                box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
            }
            50% {
                border-color: #ff0055;
                box-shadow: 0 0 40px rgba(255, 0, 85, 0.5);
            }
        }

        .visor {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 20px;
            background: #00f0ff;
            border-radius: 10px;
            box-shadow: 0 0 30px #00f0ff, 0 0 60px rgba(0, 240, 255, 0.2);
            animation: visorScan 2s linear infinite;
        }

        @keyframes visorScan {
            0% {
                opacity: 1;
                box-shadow: 0 0 30px #00f0ff, 0 0 60px rgba(0, 240, 255, 0.2);
            }
            50% {
                opacity: 0.6;
                box-shadow: 0 0 50px #ff0055, 0 0 80px rgba(255, 0, 85, 0.3);
            }
            100% {
                opacity: 1;
                box-shadow: 0 0 30px #00f0ff, 0 0 60px rgba(0, 240, 255, 0.2);
            }
        }
        .visor::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 5px;
            width: 15px;
            height: 4px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            filter: blur(1px);
        }

        .cyber-line {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 2px;
            background: #ff0055;
            box-shadow: 0 0 15px #ff0055;
            border-radius: 2px;
        }
        .cyber-line::before {
            content: '';
            position: absolute;
            top: -8px;
            left: 5px;
            width: 5px;
            height: 5px;
            background: #ff0055;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff0055;
        }

        .cyber-container.loading .cyber-head {
            animation: glitchShake 0.2s infinite alternate, borderPulse 0.5s linear infinite;
        }
        @keyframes glitchShake {
            0% {
                transform: translate(-2px, 1px) rotate(0deg);
            }
            100% {
                transform: translate(2px, -1px) rotate(2deg);
            }
        }/* === HEADER === */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-shrink: 0;
            z-index: 2;
            flex-wrap: wrap;
            gap: 10px;
            border-bottom: 1px solid rgba(0, 240, 255, 0.05);
            padding-bottom: 12px;
        }

        .brand h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #00f0ff, #ff0055);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 0, 85, 0.2);
            letter-spacing: 2px;
        }
        .brand span {
            font-size: 14px;
            color: #6a6a8a;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: -4px;
            display: block;
            font-family: 'Orbitron', sans-serif;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 6px 16px 6px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0, 240, 255, 0.1);
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 20px #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }
        .status-badge span {
            color: #8a8aaa;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
        }/* === QUICK BUTTONS === */
        .quick-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            flex-shrink: 0;
            z-index: 2;
        }
        .quick-btn {
            flex: 1;
            min-width: 65px;
            background: rgba(0, 240, 255, 0.04);
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 8px;
            padding: 10px 0;
            color: #b0b0d0;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .quick-btn:hover {
            background: rgba(255, 0, 85, 0.1);
            border-color: #ff0055;
            color: #fff;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.1);
            transform: translateY(-3px);
        }

        /* === CHAT === */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding-right: 8px;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
            z-index: 2;
        }
        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: #ff0055;
            border-radius: 10px;
        }

        .message {
            padding: 16px 20px;
            border-radius: 12px;
            max-width: 92%;
            line-height: 1.7;
            font-size: 16px;
            animation: fadeIn 0.3s ease;
            border-left: 3px solid transparent;
        }
        .message.user {
            align-self: flex-end;
            background: #12101e;
            border-left-color: #00f0ff;
            color: #d0d0f0;
        }
        .message.assistant {
            align-self: flex-start;
            background: #0c0a16;
            border: 1px solid rgba(255, 0, 85, 0.1);
            border-left-color: #ff0055;
            color: #c8c8e8;
        }
        .message.error {
            align-self: center;
            background: rgba(255, 0, 85, 0.05);
            border: 1px solid rgba(255, 0, 85, 0.2);
            color: #ff5577;
            font-size: 14px;
            text-align: center;
            max-width: 100%;
            border-left: none;
        }
        .message .label {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            opacity: 0.3;
            margin-bottom: 6px;
            display: block;
            letter-spacing: 2px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* === TYPING === */
        .typing-indicator {
            align-self: flex-start;
            background: #0c0a16;
            padding: 14px 24px;
            border-radius: 12px;
            border-left: 3px solid #ff0055;
            border: 1px solid rgba(255, 0, 85, 0.08);
            display: none;
            z-index: 2;
        }
        .typing-indicator span {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #ff0055;
            border-radius: 50%;
            margin: 0 4px;
            animation: bounce 1.4s infinite both;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.3);
        }
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes bounce {
            0%,
            80%,
            100% {
                transform: scale(0);
            }
            40% {
                transform: scale(1);
            }
        }

        /* === INPUT === */
        .input-area {
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 4px 4px 4px 20px;
            border: 1px solid rgba(0, 240, 255, 0.05);
            z-index: 2;
            transition: 0.3s;
        }
        .input-area:focus-within {
            border-color: #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.05);
        }
        .input-area input {
            flex: 1;
            background: transparent;
            border: none;
            color: #f0f0ff;
            font-size: 16px;
            padding: 14px 0;
            outline: none;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 600;
        }
        .input-area input::placeholder {
            color: #3a3a5a;
            font-weight: 400;
        }
        .input-area button {
            background: linear-gradient(135deg, #ff0055, #cc0044);
            border: none;
            border-radius: 8px;
            padding: 12px 30px;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.15);
        }
        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255, 0, 85, 0.3);
            background: linear-gradient(135deg, #ff1166, #dd0044);
        }
        .input-area button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }/* === FOOTER === */
        .footer-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            flex-shrink: 0;
            z-index: 2;
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 12px;
        }
        .footer-bar .hint {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            color: #3a3a5a;
            letter-spacing: 2px;
        }
        .footer-bar .hint i {
            color: #ff0055;
        }

        @media (max-width: 600px) {
            .app-wrapper {
                padding: 14px;
                border-radius: 16px;
            }
            .cyber-container {
                transform: scale(0.7);
                bottom: 100px;
                right: 0px;
            }
            .brand h1 {
                font-size: 24px;
            }
            .quick-btn {
                font-size: 10px;
                padding: 8px 0;
                min-width: 50px;
            }
            .input-area button {
                padding: 10px 18px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="app-wrapper">
        <!-- CYBER HEAD -->
        <div class="cyber-container" id="cyberContainer">
            <div class="cyber-head">
                <div class="visor"></div>
                <div class="cyber-line"></div>
            </div>
        </div>

        <!-- HEADER -->
        <div class="header">
            <div class="brand">
                <h1>KEN</h1>
                <span>// CYBER_ASSIST</span>
            </div>
            <div class="status-badge">
                <span class="status-dot"></span>
                <span>ONLINE // GRATIS</span>
            </div>
        </div>

        <!-- QUICK ACTIONS -->
        <div class="quick-actions">
            <button class="quick-btn" data-prompt="Jelasin konsep rumit jadi simpel, yang straight to the point.">⚡ TANYA</button>
            <button class="quick-btn" data-prompt="Bantuin nulis / rapihin teks, gaya lu yang keren.">🛠️ TULIS</button>
            <button class="quick-btn" data-prompt="Debug potongan kode, kasih tau letak error-nya.">💀 KODE</button>
            <button class="quick-btn" data-prompt="Brainstorming ide baru, yang out of the box.">🧠 IDE</button>
        </div>

        <!-- CHAT -->
        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                <span class="label">// KEN</span>
                Gue KEN. Asisten digital lo.<br />
                Mau tanya apa? Langsung aja, gak usah basa-basi.<br />
                <span style="font-size:13px; color:#3a3a5a;">(Gratis, gak pake API key. Gaskeun.)</span>
            </div>
        </div>

        <!-- TYPING -->
        <div class="typing-indicator" id="typingIndicator">
            <span></span><span></span><span></span>
        </div>

        <!-- INPUT -->
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ketik pesan buat KEN..." />
            <button id="sendButton">Kirim</button>
        </div>

        <!-- FOOTER -->
        <div class="footer-bar">
            <span class="hint">$ KEN // <i>v3.1</i> // OPEN_SOURCE</span>
            <span class="hint"># NO_KEY # FREE</span>
        </div>
    </div>

    <script>
        (function() {
            "use strict";

            const chatArea = document.getElementById('chatArea');
            const userInput = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendButton');
            const typingIndicator = document.getElementById('typingIndicator');
            const cyberContainer = document.getElementById('cyberContainer');
            const quickBtns = document.querySelectorAll('.quick-btn');

            // Konfigurasi API GRATIS (pakai proxy Rose)
            const API_URL = 'https://api.itsrose.rest/ai/chat';

            async function sendMessage() {
                const message = userInput.value.trim();
                if (!message) {
                    // Kasih feedback kalo kosong
                    userInput.style.borderColor = '#ff0055';
                    setTimeout(() => userInput.style.borderColor = '', 1000);
                    return;
                }

                // 1. TAMPILIN PESAN USER (langsung, sebelum fetch)
                addMessage('user', message);
                userInput.value = '';
                userInput.disabled = true;
                sendBtn.disabled = true;
                cyberContainer.classList.add('loading');
                typingIndicator.style.display = 'block';
                scrollToBottom();

                try {
                    // 2. Panggil API
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            // Gak perlu API key, proxy ini gratis
                        },
                        body: JSON.stringify({
                            messages: [
                                { role: 'system', content: 'Kamu adalah KEN, asisten AI yang tegas, cool, dan langsung ke poin. Gaya bicaramu santai, pake "Gue" dan "Lu" sesekali, jawab dengan percaya diri. Jangan pake emoticon lebay, cukup tegas dan keren. Jawab dalam Bahasa Indonesia.' },
                                { role: 'user', content: message }
                            ],
                            model: 'gpt-4o-mini',
                            temperature: 0.8,
                            max_tokens: 1024
                        })
                    });

                    typingIndicator.style.display = 'none';
                    cyberContainer.classList.remove('loading');

                    if (!response.ok) {
                        let errMsg = `⚠️ Error ${response.status}`;
                        try {
                            const errData = await response.json();
                            if (errData.error) errMsg = `⚠️ ${errData.error.message || errData.error}`;
                        } catch (_) { }
                        addMessage('error', `❌ ${errMsg}. Coba refresh atau kirim ulang.`);
                        userInput.disabled = false;
                        sendBtn.disabled = false;
                        return;
                    }

                    const data = await response.json();
                    // Response dari Rose: { status, result: { response } } atau langsung { choices }
                    let reply = '';
                    if (data.result && data.result.response) {
                        reply = data.result.response;
                    } else if (data.choices && data.choices.length > 0) {
                        reply = data.choices[0].message.content;
                    } else if (data.response) {
                        reply = data.response;
                    } else {
                        reply = '⚠️ Gak ada respons dari server. Coba lagi.';
                    }
                    addMessage('assistant', reply);

                } catch (error) {
                    typingIndicator.style.display = 'none';
                    cyberContainer.classList.remove('loading');
                    addMessage('error', `❌ Gagal konek: ${error.message || 'Cek internet.'}`);
                }

                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
                scrollToBottom();
            }

            function addMessage(type, content) {
                const div = document.createElement('div');
                div.className = `message ${type}`;
                const label = document.createElement('span');
                label.className = 'label';
                if (type === 'user') label.textContent = '// USER';
                else if (type === 'assistant') label.textContent = '// KEN';
                else label.textContent = '// ERROR';
                div.appendChild(label);
                const text = document.createElement('span');
                text.textContent = content;
                div.appendChild(text);
                chatArea.appendChild(div);
                scrollToBottom();
            }

            function scrollToBottom() {
                setTimeout(() => {
                    chatArea.scrollTop = chatArea.scrollHeight;
                }, 80);
            }

            // Event
            sendBtn.addEventListener('click', sendMessage);
            userInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            quickBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    userInput.value = this.dataset.prompt;
                    userInput.focus();
                });
            });

            console.log('🔥 KEN CYBER v3.1 siap!');
        })();
    </script>
</body>
</html>
