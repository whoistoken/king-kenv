<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KEN</title>
    <style>
        body { background: #0b0a0f; color: #d0d0f0; font-family: sans-serif; padding: 16px; max-width: 700px; margin: auto; }
        .chat { height: 70vh; overflow-y: auto; border: 1px solid #333; padding: 12px; border-radius: 12px; margin-bottom: 12px; background: #16141f; }
        .msg { padding: 10px 14px; border-radius: 10px; margin: 8px 0; max-width: 85%; }
        .user { background: #2a1f45; align-self: flex-end; text-align: right; margin-left: auto; }
        .ken { background: #1a142b; border-left: 3px solid #ff0055; }
        .error { background: #3a1a1a; border-left: 3px solid #ff4444; color: #ff8888; }
        .input-area { display: flex; gap: 8px; }
        .input-area input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1e1c2a; color: #fff; }
        .input-area button { padding: 12px 24px; border-radius: 10px; border: none; background: #ff0055; color: #fff; font-weight: bold; }
        .api-area { display: flex; gap: 8px; margin-bottom: 12px; }
        .api-area input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #333; background: #1e1c2a; color: #fff; }
        .api-area button { padding: 8px 16px; border-radius: 8px; border: none; background: #00aaff; color: #fff; }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-left: 8px; }
        .online { background: #00ff88; }
        .offline { background: #ff4444; }
    </style>
</head>
<body>
    <h1>KEN</h1>
    <div class="api-area">
        <input type="password" id="apiKey" placeholder="sk-... (DeepSeek Key)">
        <button onclick="saveKey()">Simpan</button>
        <span class="status" id="statusDot"></span>
    </div>
    <div class="chat" id="chatArea">
        <div class="msg ken">Gue KEN. Masukin API Key di atas, gas!</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Ketik pesan...">
        <button onclick="sendMessage()">Kirim</button>
    </div>

    <script>
        const chat = document.getElementById('chatArea');
        const input = document.getElementById('userInput');
        const apiInput = document.getElementById('apiKey');
        const statusDot = document.getElementById('statusDot');

        let apiKey = localStorage.getItem('ken_key') || '';
        if (apiKey) { apiInput.value = apiKey; statusDot.className = 'status online'; }

        function saveKey() {
            const key = apiInput.value.trim();
            if (key.startsWith('sk-')) {
                localStorage.setItem('ken_key', key);
                apiKey = key;
                statusDot.className = 'status online';
                addMessage('ken', '✅ Key tersimpan!');
            } else {
                alert('Key harus diawali "sk-"');
            }
        }

        async function sendMessage() {
            const msg = input.value.trim();
            if (!msg) return;
            if (!apiKey || !apiKey.startsWith('sk-')) {
                addMessage('error', '❌ Masukkan API Key dulu!');
                return;
            }

            addMessage('user', msg);
            input.value = '';
            input.disabled = true;

            try {
                const res = await fetch('https://api.deepseek.com/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: 'deepseek-chat',
                        messages: [
                            { role: 'system', content: 'Kamu KEN, asisten tegas dan langsung poin. Jawab dalam Bahasa Indonesia.' },
                            { role: 'user', content: msg }
                        ],
                        temperature: 0.7,
                        max_tokens: 512
                    })
                });

                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    addMessage('error', '❌ Error ' + res.status + ': ' + (err.error?.message || 'Coba lagi'));
                    input.disabled = false;
                    return;
                }

                const data = await res.json();
                const reply = data.choices?.[0]?.message?.content || 'Gak ada respons.';
                addMessage('ken', reply);

            } catch (e) {
                addMessage('error', '❌ Gagal: ' + e.message);
            }

            input.disabled = false;
            input.focus();
            chat.scrollTop = chat.scrollHeight;
        }

        function addMessage(type, text) {
            const div = document.createElement('div');
            div.className = 'msg ' + (type === 'user' ? 'user' : type === 'ken' ? 'ken' : 'error');
            div.textContent = text;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
    </script>
</body>
</html>
